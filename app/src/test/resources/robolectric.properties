# Robolectric-Unit-Tests booten standardmäßig die im Manifest deklarierte
# Application (MfsApplication). Deren onCreate startet einen Fire-and-Forget-
# Seed-Coroutine auf Dispatchers.IO (AppPolicySeed → Room), der mit dem
# Robolectric-Teardown um die SQLite-Verbindung rennt und eine uncaught
# Exception leakt ("Illegal connection pointer"), die der nächste runTest als
# UncaughtExceptionsBeforeTest meldet. Keiner der Unit-Tests braucht die echte
# Hilt-Application — daher booten wir eine Stub-Application.
sdk=33
application=android.app.Application
