# Robolectric-Unit-Tests booten standardmäßig die im Manifest deklarierte
# Application (MfsApplication). Deren onCreate verkabelt Hilt und registriert
# Hintergrund-Observer, die mit dem Robolectric-Teardown um Ressourcen rennen
# und uncaught Exceptions leaken können. Keiner der Unit-Tests braucht die echte
# Hilt-Application — daher booten wir eine Stub-Application.
sdk=33
application=android.app.Application
